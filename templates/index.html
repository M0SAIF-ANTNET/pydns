<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyDNS Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">

</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            
            <!-- Main Dashboard Card -->
            <div class="card main-card p-4 bg-white">
                <div class="text-center mb-4">
                    <h1 class="brand-title h3 mb-2">🌐 PyDNS</h1>
                    <p class="text-muted small">Local Domain & Reverse Proxy Manager</p>
                </div>

                {% if message %}
                    <div class="alert alert-info alert-dismissible fade show text-center small mb-4" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endif %}

                <form method="POST">
                    
                    <div class="mb-3">
                        <label for="domain" class="form-label font-monospace small fw-bold text-secondary">Domain Name</label>
                        <input type="text" 
                               id="domain"
                               name="domain" 
                               class="form-control" 
                               placeholder="e.g., myapp.local" 
                               required 
                               autocomplete="off">
                    </div>

                    <div class="mb-4">
                        <label for="port" class="form-label font-monospace small fw-bold text-secondary">Target Port</label>
                        <input type="number" 
                               id="port"
                               name="port" 
                               class="form-control" 
                               placeholder="e.g., 5000" 
                               min="1" 
                               max="65535" 
                               required>
                    </div>

                    <div class="row g-2">
                        <div class="col-6">
                            <button type="submit" name="action" value="add" class="btn btn-success w-100 py-2 fw-semibold">
                                ➕ Add Domain
                            </button>
                        </div>
                        <div class="col-6">
                            <button type="submit" name="action" value="remove" class="btn btn-danger w-100 py-2 fw-semibold">
                                ❌ Remove
                            </button>
                        </div>
                    </div>

                </form>
            </div>
            
            <div class="text-center mt-4">
                <p class="text-muted px-2" style="font-size: 0.75rem;">
                    Make sure to run the application with proper system privileges to allow Nginx configuration reloads.
                </p>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
